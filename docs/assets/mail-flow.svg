<svg xmlns="http://www.w3.org/2000/svg" width="980" height="260" viewBox="0 0 980 260" role="img" aria-labelledby="title desc">
  <title id="title">quickMail flow</title>
  <desc id="desc">Flujo del proceso de quickMail desde Excel hasta SMTP y reportes de invalidos.</desc>
  <style>
    .box { fill: #f5f7ff; stroke: #4253ff; stroke-width: 2; rx: 12; ry: 12; }
    .text { font-family: Arial, Helvetica, sans-serif; font-size: 15px; fill: #121212; }
    .arrow { stroke: #4253ff; stroke-width: 2.2; marker-end: url(#arrowHead); fill: none; }
    .title { font-family: Arial, Helvetica, sans-serif; font-size: 20px; font-weight: 700; fill: #1d1d1d; }
  </style>
  <defs>
    <marker id="arrowHead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#4253ff" />
    </marker>
  </defs>

  <text class="title" x="30" y="38">quickMail - Flujo operativo</text>

  <rect class="box" x="30" y="70" width="180" height="88" />
  <text class="text" x="54" y="108">Excel (XLSM/XLSX)</text>
  <text class="text" x="54" y="130">mail / adjuntos / Texto</text>

  <rect class="box" x="250" y="70" width="210" height="88" />
  <text class="text" x="272" y="108">Validaciones</text>
  <text class="text" x="272" y="130">correo + dominio DNS</text>

  <rect class="box" x="500" y="70" width="190" height="88" />
  <text class="text" x="528" y="108">Cuerpo HTML</text>
  <text class="text" x="528" y="130">Intro / Noticia / Bajada</text>

  <rect class="box" x="730" y="70" width="220" height="88" />
  <text class="text" x="760" y="108">Envio SMTP</text>
  <text class="text" x="760" y="130">TLS + autenticacion</text>

  <rect class="box" x="360" y="180" width="260" height="56" />
  <text class="text" x="390" y="214">Registro de invalidos (TXT)</text>

  <path class="arrow" d="M210 114 L250 114" />
  <path class="arrow" d="M460 114 L500 114" />
  <path class="arrow" d="M690 114 L730 114" />
  <path class="arrow" d="M355 158 L420 180" />
  <path class="arrow" d="M840 158 L560 180" />
</svg>
